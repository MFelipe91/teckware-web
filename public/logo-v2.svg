<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" role="img" aria-label="TECKWARE">
  <defs>
    <filter id="v2g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="v2grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00A8CC"/>
    </linearGradient>
  </defs>

  <!-- ══ ICONO: CPU CHIP CON PINES ══ -->

  <!-- Chip body -->
  <rect x="14" y="14" width="44" height="44" rx="5"
        fill="rgba(0,212,255,0.05)" stroke="#00D4FF" stroke-width="1.8"/>

  <!-- Pines superiores -->
  <line x1="25" y1="14" x2="25" y2="5"  stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="14" x2="36" y2="5"  stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="47" y1="14" x2="47" y2="5"  stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>

  <!-- Pines inferiores -->
  <line x1="25" y1="58" x2="25" y2="67" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="58" x2="36" y2="67" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="47" y1="58" x2="47" y2="67" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>

  <!-- Pines izquierda -->
  <line x1="14" y1="25" x2="5"  y1="25" x2="5"  y2="25" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="5"  y1="25" x2="14" y2="25" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="5"  y1="36" x2="14" y2="36" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="5"  y1="47" x2="14" y2="47" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>

  <!-- Pines derecha -->
  <line x1="58" y1="25" x2="67" y2="25" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="36" x2="67" y2="36" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="47" x2="67" y2="47" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>

  <!-- Die interior (chip core) -->
  <rect x="22" y="22" width="28" height="28" rx="2"
        fill="none" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>

  <!-- T circuito interior -->
  <line x1="25" y1="31" x2="47" y2="31" stroke="url(#v2grad)" stroke-width="3" stroke-linecap="round" filter="url(#v2g)"/>
  <line x1="36" y1="31" x2="36" y2="47" stroke="url(#v2grad)" stroke-width="3" stroke-linecap="round" filter="url(#v2g)"/>

  <!-- Nodos -->
  <circle cx="25" cy="31" r="2.2" fill="#00D4FF"/>
  <circle cx="47" cy="31" r="2.2" fill="#00D4FF"/>
  <circle cx="36" cy="31" r="3.5" fill="#00D4FF" filter="url(#v2g)"/>
  <circle cx="36" cy="47" r="2"   fill="#A855F7"/>

  <!-- Punto gaming (esquina superior derecha del die) -->
  <rect x="42" y="24" width="5" height="5" rx="1" fill="#A855F7" opacity="0.85"/>

  <!-- ══ WORDMARK ══ -->

  <!-- TECKWARE — todo en blanco, T ligeramente más grande -->
  <text y="50"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-weight="900" letter-spacing="-1.5">
    <tspan x="82" font-size="42" fill="#00D4FF">T</tspan><tspan font-size="40" fill="#F1F5F9" dy="1">ECKWARE</tspan>
  </text>

  <!-- SpA en gris muy pequeño alineado a la derecha del wordmark -->
  <text x="291" y="37"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="9" font-weight="600" fill="#2E86AB" letter-spacing="0.5">SpA</text>

  <!-- Línea inferior -->
  <line x1="82" y1="57" x2="304" y2="57" stroke="rgba(0,212,255,0.12)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="82" y="67"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="7.5" font-weight="500" letter-spacing="2" fill="#2E86AB">
    SERVICIOS INFORMÁTICOS INTEGRALES
  </text>
</svg>
