<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" role="img" aria-label="TECKWARE">
  <defs>
    <filter id="tg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ SÍMBOLO: T TECNOLÓGICA — esquinas cortadas (chamfer) ══ -->
  <!-- La T es la inicial de TECKWARE. Simple, limpia, propia. -->

  <!-- Relleno interior sutil -->
  <path d="M 20,6 L 52,6 L 58,12 L 58,20 L 42,20 L 42,66 L 30,66 L 30,20 L 14,20 L 14,12 Z"
        fill="rgba(0,212,255,0.07)"/>

  <!-- Borde principal con glow -->
  <path d="M 20,6 L 52,6 L 58,12 L 58,20 L 42,20 L 42,66 L 30,66 L 30,20 L 14,20 L 14,12 Z"
        fill="none"
        stroke="#00D4FF"
        stroke-width="2"
        stroke-linejoin="round"
        filter="url(#tg)"/>

  <!-- Detalle interior: línea horizontal dentro de la barra (layering tech) -->
  <line x1="21" y1="13" x2="51" y2="13"
        stroke="rgba(0,212,255,0.3)"
        stroke-width="1"
        stroke-linecap="round"/>

  <!-- Acento purple: esquina superior derecha cortada — pequeño bloque -->
  <rect x="52" y="6" width="6" height="6" rx="0"
        fill="#A855F7" opacity="0.85"/>

  <!-- Línea interna vertical (profundidad del stem) -->
  <line x1="36" y1="20" x2="36" y2="66"
        stroke="rgba(0,212,255,0.2)"
        stroke-width="1"
        stroke-linecap="round"/>

  <!-- Punto base del stem (gaming anchor) -->
  <rect x="30" y="60" width="12" height="6" rx="0"
        fill="rgba(168,85,247,0.25)"/>

  <!-- ══ WORDMARK ══ -->
  <text y="50"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-weight="900" font-size="40" letter-spacing="-1.5">
    <tspan x="82" fill="#00D4FF">TECK</tspan><tspan fill="#F1F5F9">WARE</tspan>
  </text>

  <!-- Línea baja -->
  <line x1="82" y1="56" x2="305" y2="56"
        stroke="rgba(0,212,255,0.15)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="82" y="66"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="7.5" font-weight="500" letter-spacing="2.5" fill="#475569">
    HARDWARE · GAMING · TRUST
  </text>
</svg>
