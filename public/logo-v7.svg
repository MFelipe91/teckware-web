<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" role="img" aria-label="TECKWARE">
  <defs>
    <!-- Glow suave para los trazos -->
    <filter id="tw" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow fuerte para el nodo central -->
    <filter id="twc" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow suave purple -->
    <filter id="twp" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    ══════════════════════════════════════════════════
    SÍMBOLO TW FUSION
    La barra horizontal ES la T y el tope de la W.
    El stem de la T desciende hasta el peak central de la W.
    Un solo símbolo → dos letras → una marca única.
    ══════════════════════════════════════════════════
  -->

  <!-- Trazo de fondo (blur layer para volumen) -->
  <g opacity="0.25" filter="url(#tw)">
    <line x1="4"  y1="10" x2="68" y2="10" stroke="#00D4FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="36" y1="10" x2="36" y2="36" stroke="#00D4FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="4"  y1="10" x2="19" y2="65" stroke="#00D4FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="19" y1="65" x2="36" y2="36" stroke="#00D4FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="36" y1="36" x2="53" y2="65" stroke="#00D4FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="53" y1="65" x2="68" y2="10" stroke="#00D4FF" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Trazos principales -->
  <!-- Barra horizontal: top de T = top rail de W -->
  <line x1="4"  y1="10" x2="68" y2="10"
        stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#tw)"/>

  <!-- Stem de T (desciende al peak central de W) -->
  <line x1="36" y1="10" x2="36" y2="36"
        stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#tw)"/>

  <!-- W — pierna izquierda exterior (desde barra hasta valley izq) -->
  <line x1="4"  y1="10" x2="19" y2="65"
        stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#tw)"/>

  <!-- W — pierna izquierda interior (desde valley izq hasta fusion point) -->
  <line x1="19" y1="65" x2="36" y2="36"
        stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#tw)"/>

  <!-- W — pierna derecha interior (desde fusion point hasta valley der) -->
  <line x1="36" y1="36" x2="53" y2="65"
        stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#tw)"/>

  <!-- W — pierna derecha exterior (desde valley der hasta barra) -->
  <line x1="53" y1="65" x2="68" y2="10"
        stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#tw)"/>

  <!--
    FUSION POINT — donde T y W se encuentran (36,36)
    Es el punto de conexión entre TECK y WARE.
    Bullseye: anillo + punto interior = precisión, confianza.
  -->
  <circle cx="36" cy="36" r="7"   fill="#00D4FF" filter="url(#twc)"/>
  <circle cx="36" cy="36" r="5.5" fill="#080B14"/>
  <circle cx="36" cy="36" r="2.5" fill="#00D4FF"/>

  <!--
    Acentos gaming: los dos valleys de la W en purple.
    (19,65) y (53,65) — los puntos más bajos = la energía baja.
  -->
  <circle cx="19" cy="65" r="3.5" fill="#A855F7" filter="url(#twp)"/>
  <circle cx="53" cy="65" r="3.5" fill="#A855F7" filter="url(#twp)"/>

  <!-- Acento mínimo en los extremos de la barra -->
  <circle cx="4"  cy="10" r="2" fill="#00D4FF" opacity="0.6"/>
  <circle cx="68" cy="10" r="2" fill="#00D4FF" opacity="0.6"/>

  <!-- ══ WORDMARK ══ -->
  <text y="50"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-weight="900" font-size="40" letter-spacing="-1.5">
    <tspan x="82" fill="#00D4FF">TECK</tspan><tspan fill="#F1F5F9">WARE</tspan>
  </text>

  <!-- Línea degradado -->
  <line x1="82" y1="56" x2="305" y2="56"
        stroke="rgba(0,212,255,0.18)" stroke-width="0.8"/>

  <!-- Tagline en inglés -->
  <text x="82" y="66"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="7.5" font-weight="500" letter-spacing="2.5" fill="#475569">
    HARDWARE · GAMING · TRUST
  </text>
</svg>
