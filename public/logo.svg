<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 284 68" role="img" aria-label="TECKWARE">
  <!--
    LOGO C — MONOGRAMA TW TIPOGRÁFICO
    T geométrica en cyan (dominante) · W geométrica en blanco ghosted (subordinada)
    Slash purple como separador de identidad · Wordmark a la derecha
  -->

  <!-- T — barras geométricas sólidas en cyan -->
  <rect x="1" y="4" width="48" height="10" fill="#00D4FF" rx="1.5"/>
  <rect x="19" y="14" width="12" height="50" fill="#00D4FF" rx="1.5"/>

  <!-- W — trazos geométricos ghosted (22% blanco) -->
  <polyline
    points="53,4 59,64 73,26 87,64 93,4"
    fill="none"
    stroke="rgba(241,245,249,0.22)"
    stroke-width="10"
    stroke-linecap="square"
    stroke-linejoin="miter"/>

  <!-- Slash separator — purple, la firma de la marca -->
  <line x1="100" y1="2" x2="106" y2="66" stroke="#A855F7" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Wordmark: TECKWARE -->
  <text y="44"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-weight="900" font-size="38" letter-spacing="-1.5">
    <tspan x="114" fill="#00D4FF">TECK</tspan><tspan fill="#F1F5F9">WARE</tspan>
  </text>

  <!-- Línea separadora sutil -->
  <line x1="114" y1="51" x2="280" y2="51" stroke="rgba(0,212,255,0.15)" stroke-width="0.7"/>

  <!-- Tagline -->
  <text x="114" y="61"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="7" font-weight="500" letter-spacing="2.5" fill="#475569">
    HARDWARE · GAMING · TRUST
  </text>
</svg>
