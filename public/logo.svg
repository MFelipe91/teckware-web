<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 52" role="img" aria-label="TECKWARE">
  <defs>
    <!-- Gradiente principal: azul profundo → cyan NVIDIA → verde teal (igual al logo PNG) -->
    <linearGradient id="twMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1B3FD4"/>
      <stop offset="42%"  stop-color="#0EA5E9"/>
      <stop offset="78%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00C88A"/>
    </linearGradient>

    <!-- Gradiente para el borde hexagonal -->
    <linearGradient id="twHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2055FF"/>
      <stop offset="50%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00E896"/>
    </linearGradient>

    <!-- Gradiente interior del hexágono (fondo oscuro translúcido) -->
    <radialGradient id="twBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#0D1F5C" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#050B1E" stop-opacity="0.95"/>
    </radialGradient>

    <!-- Highlight metálico superior -->
    <linearGradient id="twShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Glow suave para las letras -->
    <filter id="twGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path del hexágono (para el fondo interior) -->
    <clipPath id="twClip">
      <polygon points="26,2 44.6,13 44.6,35 26,46 7.4,35 7.4,13"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════ -->
  <!--   ESCUDO HEXAGONAL                 -->
  <!-- ═══════════════════════════════════ -->

  <!-- Fondo interior oscuro del hex -->
  <polygon points="26,2 44.6,13 44.6,35 26,46 7.4,35 7.4,13"
    fill="url(#twBg)"/>

  <!-- Highlight metálico superior (1/3 de arriba) -->
  <clipPath id="twTopClip">
    <rect x="0" y="0" width="52" height="22"/>
  </clipPath>
  <polygon points="26,2 44.6,13 44.6,35 26,46 7.4,35 7.4,13"
    fill="url(#twShine)" clip-path="url(#twTopClip)" opacity="0.6"/>

  <!-- Borde hexagonal exterior (gradiente de marca) -->
  <polygon points="26,2 44.6,13 44.6,35 26,46 7.4,35 7.4,13"
    fill="none" stroke="url(#twHex)" stroke-width="1.6"/>

  <!-- Borde interior sutil (efecto bisel metálico) -->
  <polygon points="26,4 43,14 43,34 26,44 9,34 9,14"
    fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>

  <!-- ═══════════════════════════════════ -->
  <!--   ANILLO ORBITAL (elemento firma)  -->
  <!-- ═══════════════════════════════════ -->
  <ellipse cx="26" cy="24" rx="21.5" ry="8"
    fill="none"
    stroke="url(#twHex)"
    stroke-width="0.9"
    stroke-dasharray="2.5 2.5"
    opacity="0.45"
    transform="rotate(-22 26 24)"/>

  <!-- ═══════════════════════════════════ -->
  <!--   LETRAS TW (monograma)            -->
  <!-- ═══════════════════════════════════ -->

  <!-- Barra horizontal compartida T+W -->
  <rect x="10" y="13.5" width="29" height="3.2" fill="url(#twMain)" rx="0.4"
    filter="url(#twGlow)"/>

  <!-- Tallo vertical de la T -->
  <rect x="17" y="13.5" width="3.8" height="21.5" fill="url(#twMain)" rx="0.4"
    filter="url(#twGlow)"/>

  <!-- W — cuatro trazos angulares bajo la barra (gaming / angular) -->
  <polyline
    points="22.2,16.7 24.5,34 27.4,23.5 30.3,34 32.6,16.7"
    fill="none"
    stroke="url(#twMain)"
    stroke-width="3"
    stroke-linecap="butt"
    stroke-linejoin="miter"
    filter="url(#twGlow)"/>

  <!-- ═══════════════════════════════════ -->
  <!--   WORDMARK: TECKWARE               -->
  <!-- ═══════════════════════════════════ -->

  <!-- TECK — blanco, extra-bold (la parte dominante) -->
  <text x="58" y="32"
    font-family="'Arial Black', 'Arial Bold', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="0.5"
    fill="#F1F5F9">TECK</text>

  <!-- WARE — cyan suave, regular (la parte subordinada) -->
  <text x="113" y="32"
    font-family="'Arial', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="22"
    letter-spacing="0.5"
    fill="#00D4FF">WARE</text>

  <!-- Línea decorativa bajo el wordmark (tech-line) -->
  <line x1="58" y1="36.5" x2="222" y2="36.5"
    stroke="url(#twHex)" stroke-width="0.6" opacity="0.3"/>

  <!-- Subtítulo: tagline de identidad -->
  <text x="58" y="46"
    font-family="'Arial', sans-serif"
    font-size="6.2"
    font-weight="500"
    letter-spacing="2.4"
    fill="#475569">SOLUCIONES TECNOLÓGICAS</text>
</svg>
