<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" role="img" aria-label="TECKWARE">
  <defs>
    <filter id="pw" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ SÍMBOLO: POWER BUTTON ══ -->
  <!-- Arco de círculo (gap arriba = símbolo de encendido universal) -->
  <path d="M 48,24 A 22,22 0 1 1 24,24"
        fill="none"
        stroke="#00D4FF"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#pw)"/>

  <!-- Línea vertical central -->
  <line x1="36" y1="14" x2="36" y2="38"
        stroke="#00D4FF"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#pw)"/>

  <!-- Glow ring interior (sutil) -->
  <circle cx="36" cy="42" r="10"
          fill="none"
          stroke="rgba(0,212,255,0.12)"
          stroke-width="8"/>

  <!-- Punto central -->
  <circle cx="36" cy="42" r="2.5" fill="rgba(0,212,255,0.5)"/>

  <!-- Acento gaming: pequeño punto purple arriba a la derecha -->
  <circle cx="52" cy="18" r="3.5" fill="#A855F7" filter="url(#pw)"/>

  <!-- ══ WORDMARK ══ -->
  <text y="50"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-weight="900" font-size="40" letter-spacing="-1.5">
    <tspan x="82" fill="#00D4FF">TECK</tspan><tspan fill="#F1F5F9">WARE</tspan>
  </text>

  <!-- Línea baja -->
  <line x1="82" y1="56" x2="305" y2="56" stroke="rgba(0,212,255,0.15)" stroke-width="0.8"/>

  <!-- Tagline en inglés -->
  <text x="82" y="66"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="7.5" font-weight="500" letter-spacing="2.5" fill="#475569">
    HARDWARE · GAMING · TRUST
  </text>
</svg>
