<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" role="img" aria-label="TECKWARE">
  <defs>
    <filter id="lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- ══ SÍMBOLO: RAYO / LIGHTNING BOLT ══ -->
  <!-- Energía, gaming, velocidad, potencia -->

  <!-- Sombra/glow del rayo -->
  <polygon
    points="44,5 24,38 36,38 28,67 52,30 38,30"
    fill="rgba(0,212,255,0.08)"
    stroke="none"/>

  <!-- Rayo principal con gradiente -->
  <polygon
    points="44,5 24,38 36,38 28,67 52,30 38,30"
    fill="none"
    stroke="url(#bgrad)"
    stroke-width="2.2"
    stroke-linejoin="round"
    filter="url(#lg)"/>

  <!-- Relleno interior sutil -->
  <polygon
    points="44,5 24,38 36,38 28,67 52,30 38,30"
    fill="url(#bgrad)"
    opacity="0.12"/>

  <!-- Punto de impacto abajo (gaming accent) -->
  <circle cx="28" cy="67" r="3" fill="#A855F7" filter="url(#lg)"/>

  <!-- ══ WORDMARK ══ -->
  <text y="50"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-weight="900" font-size="40" letter-spacing="-1.5">
    <tspan x="82" fill="#00D4FF">TECK</tspan><tspan fill="#F1F5F9">WARE</tspan>
  </text>

  <!-- Línea baja -->
  <line x1="82" y1="56" x2="305" y2="56" stroke="rgba(0,212,255,0.15)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="82" y="66"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="7.5" font-weight="500" letter-spacing="2.5" fill="#475569">
    HARDWARE · GAMING · TRUST
  </text>
</svg>
