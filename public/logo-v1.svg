<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" role="img" aria-label="TECKWARE">
  <defs>
    <filter id="v1g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="v1line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ══ ICONO: HUD GAMING RETICLE ══ -->

  <!-- Background subtle -->
  <rect x="6" y="6" width="60" height="60" rx="2" fill="rgba(0,212,255,0.04)"/>

  <!-- Corner brackets -->
  <path d="M 6,22 L 6,6 L 22,6"   fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#v1g)"/>
  <path d="M 50,6 L 66,6 L 66,22"  fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#v1g)"/>
  <path d="M 6,50 L 6,66 L 22,66"  fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#v1g)"/>
  <path d="M 50,66 L 66,66 L 66,50" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#v1g)"/>

  <!-- Mid traces (PCB) -->
  <line x1="6"  y1="36" x2="18" y2="36" stroke="#00D4FF" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <line x1="54" y1="36" x2="66" y2="36" stroke="#00D4FF" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Circuit T -->
  <line x1="20" y1="28" x2="52" y2="28" stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#v1g)"/>
  <line x1="36" y1="28" x2="36" y2="55" stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" filter="url(#v1g)"/>

  <!-- Nodes -->
  <circle cx="20" cy="28" r="2.5" fill="#00D4FF"/>
  <circle cx="52" cy="28" r="2.5" fill="#00D4FF"/>
  <circle cx="36" cy="28" r="5"   fill="#00D4FF" filter="url(#v1g)"/>
  <circle cx="36" cy="28" r="2.2" fill="#F1F5F9"/>
  <circle cx="36" cy="55" r="3.5" fill="#A855F7" filter="url(#v1g)"/>

  <!-- Gaming pixels top-right -->
  <rect x="52" y="9"  width="4" height="4" rx="1" fill="#A855F7"/>
  <rect x="57" y="9"  width="4" height="4" rx="1" fill="#A855F7" opacity="0.5"/>
  <rect x="52" y="14" width="4" height="4" rx="1" fill="#A855F7" opacity="0.5"/>

  <!-- ══ WORDMARK ══ -->

  <!-- TECKWARE — T cyan, ECKWARE white -->
  <text y="50"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-weight="900" font-size="40" letter-spacing="-1.5">
    <tspan x="82" fill="#00D4FF">T</tspan><tspan fill="#F1F5F9">ECKWARE</tspan>
  </text>

  <!-- Línea degradado bajo el texto -->
  <rect x="82" y="56" width="222" height="1" fill="url(#v1line)"/>

  <!-- Descriptor -->
  <text x="82" y="67"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="7.5" font-weight="500" letter-spacing="2.5" fill="#475569">
    HARDWARE · GAMING · SERVICIO TÉCNICO
  </text>
</svg>
